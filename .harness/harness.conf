#!/usr/bin/env bash
# harness.conf — SOFARPC Triple Netty Migration 项目配置
# ─────────────────────────────────────────────────────────────────────────────

# ── [必填] 项目名称 ──────────────────────────────────────────────────────────
PROJECT_NAME="sofarpc-triple-netty-migration"

# ── [必填] 愿景文档路径 ──────────────────────────────────────────────────────
VISION_DOC="$PROJECT_ROOT/.harness/vision.md"

# ── [必填] 评估脚本 ──────────────────────────────────────────────────────────
EVALUATE_CMD="$PROJECT_ROOT/.harness/scripts/evaluate.sh"

# ── [可选] 测试命令 ──────────────────────────────────────────────────────────
# 只跑 remoting-triple 模块，不跑整个 sofa-rpc（避免需要外部服务）
TEST_CMD="mvn test -pl remoting/remoting-triple -Dmaven.test.failure.ignore=false -q"

# ── [可选] 快速预检命令 ──────────────────────────────────────────────────────
# 编译检查（跳过测试），确保代码至少能编译
PREFLIGHT_CMD="mvn compile -pl remoting/remoting-triple -q -Dmaven.test.skip=true"

# ── [可选] MUST 项强制验收检查 ───────────────────────────────────────────────
MUST_CHECK_CMD="bash $PROJECT_ROOT/.harness/scripts/must-check.sh"

# ── [可选] 额外上下文 ────────────────────────────────────────────────────────
EXTRA_CONTEXT="
=== SOFARPC Triple Migration 架构约束 ===

1. 目标模块: remoting/remoting-triple/
2. 参考实现: remoting/remoting-triplex/ (TripleXGrpcCodec, TripleXHttp2Handler)
3. Java 版本: Java 8（禁止使用 Java 9+ 特性）
4. 关键约束：
   - 禁止在 stream/、codec/、call/ 包下 import io.grpc.* 任何类
   - SPI 注册 tri= 不可变
   - gRPC 5-byte frame 格式必须与 TripleXGrpcCodec 一致
5. 编码规范：
   - 与现有代码风格一致（Checkstyle 遵守，if/else 不省略大括号）
   - 新增公共 API 必须有 Javadoc
6. 参考 Dubbo Triple 的三层架构:
   - dubbo-rpc-triple/stream/ → RpcStream
   - dubbo-rpc-triple/call/  → RpcCall
   - dubbo-rpc-triple/codec/ (隐含) → RpcCodec
"

# ══════════════════════════════════════════════════════════════════════════════
# v2 配置项
# ══════════════════════════════════════════════════════════════════════════════

# AI 增强评估（Layer 2）
AI_EVAL_ENABLED="true"
AI_EVAL_WEIGHT="40"         # 静态60% + AI 40%

# 自演进测试（Layer 3）
EVOLVING_TESTS="true"

# 愿景同步 — 指向 remoting-triplex 作为参考材料
VISION_REFS="remoting/remoting-triplex"
VISION_SYNC_INTERVAL="3"    # 每 3 轮审视一次

# Sprint 粒度
MAX_FILES_PER_SPRINT="10"

# 自动提交（每 Sprint 评分 >= 80 时自动 commit）
AUTO_COMMIT="true"
AUTO_COMMIT_THRESHOLD="80"
